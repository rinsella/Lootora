services:
  app:
    image: ${DOCKER_IMAGE:-rinsella619/lootora:latest}
    container_name: lootora_app
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public
    networks:
      - lootora

  nginx:
    image: nginx:alpine
    container_name: lootora_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - lootora

  mysql:
    image: mysql:8.0
    container_name: lootora_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lootora

  queue:
    image: ${DOCKER_IMAGE:-rinsella619/lootora:latest}
    container_name: lootora_queue
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60", "--sleep=3"]
    networks:
      - lootora

  scheduler:
    image: ${DOCKER_IMAGE:-rinsella619/lootora:latest}
    container_name: lootora_scheduler
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    networks:
      - lootora

volumes:
  mysql_data:
  app_storage:
  app_public:

networks:
  lootora:
    driver: bridge
